apiVersion: apps/v1
kind: Deployment
metadata:
  name: stayngo-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: stayngo-frontend
  template:
    metadata:
      labels:
        app: stayngo-frontend
    spec:
      containers:
      - name: frontend
        image:  samarthdave23/stayngo-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort:  5001
        envFrom:
        - configMapRef:
            name: stayngo-config
---
apiVersion: v1
kind: Service
metadata:
  name: stayngo-frontend
spec:
  selector:
    app: stayngo-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  # LoadBalancer automatically requests a public IP or Cloud LoadBalancer from the provider
  type: LoadBalancer
